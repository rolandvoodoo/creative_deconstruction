<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Deconstruction — Voodoo UA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f8f8f7; color: #1a1a1a; min-height: 100vh; }
    .container { max-width: 760px; margin: 0 auto; padding: 48px 24px; }
    .label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #888; margin-bottom: 16px; }

    .drop-zone {
      border: 1.5px dashed #ccc; border-radius: 12px;
      padding: 48px 24px; text-align: center; cursor: pointer;
      background: #fff; transition: border-color 0.15s, background 0.15s;
    }
    .drop-zone:hover { border-color: #888; background: #fafafa; }
    .drop-zone.drag { border-color: #4caf50; background: #f0faf0; border-style: solid; }
    .drop-zone.has-file { border-style: solid; border-color: #4caf50; background: #f0faf0; }
    .drop-zone-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .drop-zone-sub { font-size: 13px; color: #666; margin-top: 6px; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px; border: none; border-radius: 8px;
      background: #1a1a1a; color: #fff; font-size: 14px;
      cursor: pointer; font-family: inherit; transition: opacity 0.2s;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn-row { margin-top: 16px; display: flex; align-items: center; gap: 12px; }

    .spinner { width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-wrap { flex: 1; max-width: 320px; }
    .progress-bar { width: 100%; height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: #1a1a1a; width: 0%; transition: width 0.3s; }
    .progress-label { font-size: 11px; color: #666; margin-top: 6px; }

    .result { margin-top: 32px; background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; overflow: hidden; }
    .result-header { padding: 20px 24px; border-bottom: 0.5px solid #eee; }
    .result-header h2 { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 5px; background: #f0f0f0; color: #555; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8f8f7; text-align: left; padding: 10px 16px; font-size: 12px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 11px 16px; border-bottom: 0.5px solid #f0f0f0; font-size: 14px; vertical-align: top; }
    .grade { font-weight: 600; white-space: nowrap; font-size: 12px; }
    .grade-GOOD { color: #166534; } .grade-OK { color: #92400e; } .grade-BAD { color: #991b1b; } .grade-N { color: #999; }
    .verdict { color: #444; line-height: 1.5; }
    .sw { display: grid; grid-template-columns: 1fr 1fr; }
    .sw-box { padding: 16px 20px; }
    .sw-box:first-child { border-right: 0.5px solid #f0f0f0; }
    .sw-box p { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .sw-box ul { padding-left: 16px; }
    .sw-box li { font-size: 13px; line-height: 1.6; margin-bottom: 4px; color: #444; }
    .sw-box.s p { color: #166534; } .sw-box.w p { color: #991b1b; }
    .report-link { padding: 16px 20px; border-top: 0.5px solid #eee; display: flex; align-items: center; justify-content: space-between; }
    .report-link a { font-size: 13px; color: #1d4ed8; text-decoration: none; font-weight: 500; }
    .report-link a:hover { text-decoration: underline; }
    .report-link span { font-size: 12px; color: #aaa; }

    .msg { margin-top: 16px; padding: 12px 16px; border-radius: 8px; font-size: 13px; line-height: 1.6; }
    .msg.error { background: #fff5f5; border: 0.5px solid #fca5a5; color: #991b1b; }
  </style>
</head>
<body>
<div class="container">
  <p class="label">Voodoo UA — Creative Deconstruction</p>

  <div id="dropZone" class="drop-zone">
    <div class="drop-zone-title" id="dzTitle">Drop your MP4 here</div>
    <div class="drop-zone-sub" id="dzSub">or click to browse</div>
  </div>
  <input type="file" id="fileInput" accept="video/*" style="display:none">

  <div class="btn-row">
    <button class="btn" id="analyzeBtn" disabled>
      <span id="btnLabel">Analyze</span>
    </button>
    <div class="progress-wrap" id="progressWrap" style="display:none;">
      <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">—</div>
    </div>
  </div>

  <div id="error" class="msg error" style="display:none"></div>
  <div id="result" class="result" style="display:none"></div>
</div>

<script>
const BACKEND = "https://creativedeconstruction-production.up.railway.app";
const TARGET_MAX_MB = 18;
const MAX_DIMENSION = 720;

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const dzTitle = document.getElementById("dzTitle");
const dzSub = document.getElementById("dzSub");
const analyzeBtn = document.getElementById("analyzeBtn");
const btnLabel = document.getElementById("btnLabel");
const errorEl = document.getElementById("error");
const resultEl = document.getElementById("result");
const progressWrap = document.getElementById("progressWrap");
const progressFill = document.getElementById("progressFill");
const progressLabel = document.getElementById("progressLabel");

let selectedFile = null;

function setFile(file) {
  if (!file) return;
  selectedFile = file;
  dzTitle.textContent = "✓  " + file.name;
  dzSub.textContent = (file.size / 1024 / 1024).toFixed(1) + " MB";
  dropZone.classList.add("has-file");
  analyzeBtn.disabled = false;
  hideError();
  resultEl.style.display = "none";
}

dropZone.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", (e) => { if (e.target.files[0]) setFile(e.target.files[0]); });

["dragenter", "dragover"].forEach(evt => {
  dropZone.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); dropZone.classList.add("drag"); });
});
["dragleave", "dragend"].forEach(evt => {
  dropZone.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); dropZone.classList.remove("drag"); });
});
dropZone.addEventListener("drop", (e) => {
  e.preventDefault(); e.stopPropagation();
  dropZone.classList.remove("drag");
  const f = e.dataTransfer?.files?.[0];
  if (f) {
    if (f.type.startsWith("video/") || /\.(mp4|mov|webm|m4v)$/i.test(f.name)) setFile(f);
    else showError("Please drop a video file.");
  }
});
["dragover", "drop"].forEach(evt => window.addEventListener(evt, (e) => e.preventDefault()));

// --- Compression via MediaRecorder ---
async function compressVideo(file, onProgress) {
  return new Promise(async (resolve, reject) => {
    try {
      const video = document.createElement("video");
      video.muted = false;
      video.playsInline = true;
      video.src = URL.createObjectURL(file);

      await new Promise((res, rej) => {
        video.onloadedmetadata = res;
        video.onerror = () => rej(new Error("Could not read video metadata"));
      });

      const duration = video.duration;
      const { videoWidth: vw, videoHeight: vh } = video;
      const scale = Math.min(1, MAX_DIMENSION / Math.max(vw, vh));
      const w = Math.round(vw * scale / 2) * 2;
      const h = Math.round(vh * scale / 2) * 2;

      // Target bitrate to hit ~TARGET_MAX_MB
      const targetBits = TARGET_MAX_MB * 1024 * 1024 * 8;
      const videoBitrate = Math.max(400_000, Math.floor(targetBits / duration) - 128_000);

      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext("2d");

      const canvasStream = canvas.captureStream(30);

      // Capture audio from video element
      let audioTrack = null;
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(video);
        const dest = audioCtx.createMediaStreamDestination();
        source.connect(dest);
        source.connect(audioCtx.destination);
        audioTrack = dest.stream.getAudioTracks()[0];
        if (audioTrack) canvasStream.addTrack(audioTrack);
      } catch (e) {
        console.warn("Could not capture audio:", e);
      }

      // Pick best supported mime
      const mimeOptions = [
        "video/mp4;codecs=avc1.42E01E,mp4a.40.2",
        "video/mp4",
        "video/webm;codecs=vp9,opus",
        "video/webm;codecs=vp8,opus",
        "video/webm",
      ];
      const mimeType = mimeOptions.find(m => MediaRecorder.isTypeSupported(m)) || "video/webm";

      const recorder = new MediaRecorder(canvasStream, {
        mimeType,
        videoBitsPerSecond: videoBitrate,
        audioBitsPerSecond: 128_000,
      });

      const chunks = [];
      recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.onerror = (e) => reject(e.error || new Error("Recorder error"));
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: mimeType });
        URL.revokeObjectURL(video.src);
        resolve({ blob, mimeType, duration });
      };

      video.muted = true; // avoid audible playback to user
      video.currentTime = 0;

      const drawLoop = () => {
        if (video.paused || video.ended) return;
        ctx.drawImage(video, 0, 0, w, h);
        if (onProgress && duration > 0) {
          onProgress(Math.min(100, (video.currentTime / duration) * 100));
        }
        requestAnimationFrame(drawLoop);
      };

      video.onplay = () => {
        drawLoop();
      };
      video.onended = () => {
        if (recorder.state !== "inactive") recorder.stop();
      };

      recorder.start(1000);
      await video.play();
    } catch (err) {
      reject(err);
    }
  });
}

// --- Analyze flow ---
analyzeBtn.addEventListener("click", analyze);

async function analyze() {
  if (!selectedFile) return;

  analyzeBtn.disabled = true;
  hideError();
  resultEl.style.display = "none";
  showProgress();

  try {
    const originalSizeMb = selectedFile.size / 1024 / 1024;
    let fileToSend = selectedFile;
    let fileName = selectedFile.name;

    if (originalSizeMb > TARGET_MAX_MB) {
      btnLabel.innerHTML = '<span class="spinner"></span> Compressing…';
      setProgress(0, "Compressing video in browser…");

      const { blob, mimeType } = await compressVideo(selectedFile, (pct) => {
        setProgress(pct, `Compressing… ${pct.toFixed(0)}%`);
      });

      const ext = mimeType.includes("mp4") ? ".mp4" : ".webm";
      const compressedSize = blob.size / 1024 / 1024;
      fileToSend = new File([blob], fileName.replace(/\.[^.]+$/, '') + '_compressed' + ext, { type: mimeType });
      setProgress(100, `Compressed ${originalSizeMb.toFixed(1)}MB → ${compressedSize.toFixed(1)}MB`);
    }

    btnLabel.innerHTML = '<span class="spinner"></span> Uploading…';
    setProgress(0, 'Uploading to server…');

    const data = await uploadAndAnalyze(fileToSend);
    setProgress(100, 'Done');
    renderResult(data);
  } catch (e) {
    console.error(e);
    showError(e.message || "Something went wrong.");
    hideProgress();
  }

  btnLabel.textContent = "Analyze";
  analyzeBtn.disabled = false;
}

function uploadAndAnalyze(file) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    const fd = new FormData();
    fd.append("video", file);

    xhr.upload.addEventListener("progress", (e) => {
      if (e.lengthComputable) {
        const pct = (e.loaded / e.total) * 100;
        setProgress(pct, `Uploading… ${pct.toFixed(0)}%`);
      }
    });

    xhr.addEventListener("load", () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        setProgress(100, 'Analyzing video + audio on server…');
        btnLabel.innerHTML = '<span class="spinner"></span> Analyzing…';
        try { resolve(JSON.parse(xhr.responseText)); }
        catch { reject(new Error("Invalid response from server")); }
      } else {
        let msg = `Server error (${xhr.status})`;
        try { const err = JSON.parse(xhr.responseText); if (err.error) msg = err.error; } catch {}
        reject(new Error(msg));
      }
    });

    xhr.addEventListener("error", () => reject(new Error("Network error.")));
    xhr.addEventListener("timeout", () => reject(new Error("Request timed out.")));

    xhr.open("POST", `${BACKEND}/analyze`);
    xhr.timeout = 10 * 60 * 1000;
    xhr.send(fd);
  });
}

function showProgress() { progressWrap.style.display = "block"; }
function hideProgress() { progressWrap.style.display = "none"; }
function setProgress(pct, label) {
  progressFill.style.width = pct + "%";
  progressLabel.textContent = label;
}
function showError(msg) { errorEl.textContent = msg; errorEl.style.display = "block"; }
function hideError() { errorEl.style.display = "none"; }

function renderResult(data) {
  const rows = (data.dimensions || []).map(d => {
    const gradeClass = `grade-${(d.grade || "OK").replace(/\W/g,"") || "OK"}`;
    return `<tr><td>${escapeHtml(d.name)}</td><td class="grade ${gradeClass}">${escapeHtml(d.grade || "")}</td><td class="verdict">${escapeHtml(d.verdict || "")}</td></tr>`;
  }).join("");

  const strengths = (data.strengths || []).map(s => `<li>${escapeHtml(s)}</li>`).join("") || "<li>—</li>";
  const weaknesses = (data.weaknesses || []).map(w => `<li>${escapeHtml(w)}</li>`).join("") || "<li>—</li>";
  const reportUrl = `${BACKEND}/report/${encodeURIComponent(data.report_filename)}`;

  resultEl.innerHTML = `
    <div class="result-header">
      <h2>${escapeHtml(data.ad_name || "Ad")}</h2>
      <div class="tags">
        <span class="tag">Video</span>
        <span class="tag">${escapeHtml(data.ad_type || "—")}</span>
        <span class="tag">${data.duration ? data.duration + "s" : "—"}</span>
      </div>
    </div>
    <table>
      <tr><th>Dimension</th><th>Grade</th><th>Verdict</th></tr>
      ${rows}
    </table>
    <div class="sw">
      <div class="sw-box s"><p>Strengths</p><ul>${strengths}</ul></div>
      <div class="sw-box w"><p>Weaknesses</p><ul>${weaknesses}</ul></div>
    </div>
    <div class="report-link">
      <a href="${reportUrl}" target="_blank" rel="noopener">Open full illustrated report →</a>
      <span>timeline · frames · script</span>
    </div>`;
  resultEl.style.display = "block";
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}
</script>
</body>
</html>
